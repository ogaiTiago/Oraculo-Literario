<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Oráculo Astrológico Literário: uma consulta estática que revela contos a partir da data e hora de nascimento."
    />
    <title>Oráculo Astrológico Literário</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <a href="./">Oráculo Astrológico Literário</a>
        <span>24 contos / 12 signos</span>
      </header>

      <section class="hero">
        <div class="intro">
          <h1>Descubra o conto de Caio Fernando Abreu que acompanha o seu mapa de nascimento.</h1>

          <div id="oracle-form" class="form">
            <label>
              Data de nascimento
              <input id="birth-date" type="date" required />
            </label>

            <label>
              Hora de nascimento
              <input id="birth-time" type="time" required />
            </label>

            <button id="reveal-button" type="button">Revelar conto</button>
            <p id="form-error" class="error" role="alert" aria-live="polite"></p>
          </div>

          <section id="result" class="result" hidden aria-live="polite">
            <div class="result-meta">
              <span id="result-symbol" aria-hidden="true"></span>
              <div>
                <p id="result-sign"></p>
                <p id="result-period"></p>
              </div>
            </div>

            <p id="result-book" class="book"></p>
            <h2 id="result-title"></h2>
            <p class="why"><strong>Por que combina:</strong> <span id="result-why"></span></p>
            <div id="story-block" class="story">
              <div id="result-story"></div>
            </div>
            <button id="reset-result" type="button" class="secondary">Refazer consulta</button>
          </section>
        </div>
      </section>

    </main>

    <script src="./assets/stories.js"></script>
    <script src="./assets/app.js"></script>
  </body>
</html>
