<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Primeira Página</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #007BFF;
        }
        .botao {
            display: inline-block;
            background-color: #007BFF;
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 15px;
        }
        .botao:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <h1>Olá, Mundo!</h1>
    <p>Este é um exemplo de uma página HTML básica, estilizada e pronta para usar.</p>
    
    <h3>O que tem aqui?</h3>
    <ul>
        <li>Estrutura oficial do HTML5.</li>
        <li>Tags de cabeçalho e parágrafo.</li>
        <li>Uma lista simples.</li>
        <li>Um pouco de CSS para não ficar com cara de internet dos anos 90.</li>
    </ul>

    <a href="#" class="botao">Clique Aqui</a>

</body>
</html>
